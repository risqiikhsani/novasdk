name: Hypernova Universal Publisher

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Verify Versions Match Tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          # uv run makes sure tomllib is available in a temporary environment if needed
          PY_VERSION=$(uvx python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match pyproject.toml ($PY_VERSION)"
            exit 1
          fi

      - name: Build Package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish