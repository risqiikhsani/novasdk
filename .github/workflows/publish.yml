name: Hypernova Universal Publisher

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- VERSION CHECK STEP ---
      - name: Verify Versions Match Tag
        run: |
          # Get the tag name (e.g., v1.2.3 -> 1.2.3)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          
          # Check npm version
          NPM_VERSION=$(node -p "require('./package.json').version")
          
          # Check Python version (assumes pyproject.toml)
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          if [ "$TAG_VERSION" != "$NPM_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match npm version ($NPM_VERSION)"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match PyPI version ($PY_VERSION)"
            exit 1
          fi
          echo "Versions Verified: $TAG_VERSION"

      # --- NPM PUBLISH ---
      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access public

      # --- PYPI PUBLISH ---
      - name: Publish to PyPI
        run: |
          pip install build twine
          python -m build
          
          # Create .pypirc on the fly
          echo "[pypi]" > ~/.pypirc
          echo "username = __token__" >> ~/.pypirc
          echo "password = ${{ secrets.PYPI_TOKEN }}" >> ~/.pypirc
          
          twine upload dist/* --config-file ~/.pypirc