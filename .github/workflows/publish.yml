name: Hypernova Universal Publisher

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -e .

      # --- VERSION CHECK STEP ---
      - name: Verify Versions Match Tag
        run: |
          # Get the tag name (e.g., v1.2.3 -> 1.2.3)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}

          # Check Python version from pyproject.toml
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match PyPI version ($PY_VERSION)"
            exit 1
          fi
          echo "Version Verified: $TAG_VERSION"

      # --- PYPI PUBLISH ---
      - name: Publish to PyPI
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

          # Create .pypirc on the fly
          echo "[pypi]" > ~/.pypirc
          echo "username = __token__" >> ~/.pypirc
          echo "password = ${{ secrets.PYPI_TOKEN }}" >> ~/.pypirc

          twine upload dist/* --config-file ~/.pypirc